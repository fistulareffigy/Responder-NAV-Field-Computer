[platformio]
default_envs = wrover_kit_deploy_cam

[env:wrover_kit_deploy_cam]
platform = espressif32
board = freenove_esp32_wrover
framework = arduino
monitor_speed = 115200
upload_speed = 115200
extra_scripts =
  pre:../sanitize_build_paths.py
build_flags =
  -D CAMERA_MODEL_WROVER_KIT
  -D CORE_DEBUG_LEVEL=1
