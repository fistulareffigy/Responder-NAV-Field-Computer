[platformio]
default_envs = esp32p4_pioarduino55

[env:esp32p4_pioarduino]
platform = https://github.com/pioarduino/platform-espressif32.git#54.03.21
upload_speed = 460800
board_upload.before_reset = default-reset
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
# Use the UART monitor (not USB CDC) to avoid ESP32-P4 CDC ISR crashes.
# PlatformIO auto-detects the port; pass --upload-port/--port when needed.
build_type = release
framework = arduino
board = esp32-p4-evboard
board_build.mcu = esp32p4
board_build.flash_mode = qio
platform_packages =
board_build.partitions = partitions/tab5_16mb.csv
build_flags =
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DCONFIG_TINYUSB_ENABLED=1
  -DCONFIG_TINYUSB_MSC_ENABLED=0
  -DENABLE_WIFI=1
  -DCONFIG_WIFI_RMT_CSI_ENABLED=1
  -DENABLE_SD=1
  -DDISABLE_TILES=0
  -DGPS_RX_PIN=7
  -DGPS_TX_PIN=6
  -DGPS_SERIAL_PORT=2
  -DGPS_BAUD=115200
  -DGPS_AUTO_PIN=0
  -DGPS_AUTO_BAUD=0
  -DGPS_RX_SCAN=0
  -DGPS_RAW_DUMP=0
  -DGPS_KICK=0
  -DENABLE_SERIAL_LOG=1
  -DMAX_GROUP_CHANNELS=2
  -DSD_SPI_MISO=39
  -DSD_SPI_CS=42
  -DSD_SPI_SCK=43
  -DSD_SPI_MOSI=44
  -Ilib/esp_video/include
  -Ilib/esp_video/private_include
  -Ilib/esp_cam_sensor/include
  -Ilib/esp_cam_sensor/sensors/sc202cs/include
  -Ilib/esp_cam_sensor/sensors/sc202cs/private_include
  -Ilib/esp_sccb_intf/include
  -Ilib/esp_sccb_intf/interface
  -Ilib/esp_sccb_intf/sccb_i2c/include
  -Ilib/esp_ipa/include
  -Llib/esp_ipa/lib/esp32p4
  -lesp_ipa
  -DCONFIG_ESP_VIDEO_ENABLE_MIPI_CSI_VIDEO_DEVICE=1
  -DCONFIG_ESP_VIDEO_ENABLE_ISP=1
  -DCONFIG_ESP_VIDEO_ENABLE_ISP_VIDEO_DEVICE=1
  -DCONFIG_ESP_VIDEO_ENABLE_ISP_PIPELINE_CONTROLLER=1
  -DCAMERA_USE_ISP_DEVICE=0
  -DCAMERA_BYTE_SWAP=0
  -DCAMERA_RGB_SWAP=0
  -DCAMERA_ROTATION=180
  -DCAMERA_MIRROR_X=0
  -DCAMERA_MIRROR_Y=1
  -DCAMERA_FORCE_ISP_DEMOSAIC=0
  -DCAMERA_FORCE_ISP_BF=0
  -DCAMERA_PREVIEW_DISABLED=0
  -DCAMERA_PREVIEW_SWAP_BYTES=1
  -DCAMERA_PREVIEW_USE_PPA=1
  -DCAMERA_PREVIEW_FILL=1
  -DCAMERA_ISP_DEMOSAIC_GRAD=50
  -DCAMERA_ISP_BF_LEVEL=6
  -DCONFIG_ESP_VIDEO_ENABLE_HW_H264_VIDEO_DEVICE=0
  -DCONFIG_ESP_IPA_AWB_GRAY_WORLD=1
  -DCONFIG_ESP_IPA_AGC_THRESHOLD=1
  -DCONFIG_ESP_IPA_DENOISING_GAIN_FEEDBACK=1
  -DCONFIG_ESP_IPA_SHARPEN_FREQUENCY_FEEDBACK=1
  -DCONFIG_ESP_IPA_GAMMA_LUMA=1
  -DCONFIG_ESP_IPA_CC_LINEAR=1
  -DCONFIG_CAMERA_SC202CS=1
  -DCONFIG_CAMERA_SC202CS_MAX_SUPPORT=1
  -DCONFIG_CAMERA_SC202CS_AUTO_DETECT=1
  -DCONFIG_CAMERA_SC202CS_AUTO_DETECT_MIPI_INTERFACE_SENSOR=1
  -DCONFIG_CAMERA_SC202CS_ABSOLUTE_GAIN_LIMIT=63008
  -DCONFIG_CAMERA_SC202CS_DIG_GAIN_PRIORITY=1
  -DCONFIG_CAMERA_SC202CS_MIPI_RAW8_1280x720_30FPS=1
  -DCONFIG_CAMERA_SC202CS_MIPI_IF_FORMAT_INDEX_DAFAULT=0
  -DSCCB_ARDUINO_OVERRIDE=1
  -DCONFIG_ESP_SCCB_TRANS_TIMEOUT_DEFAULT=500
  -DSDFAT_FILE_TYPE=3
  -DESP_VIDEO_VER_MAJOR=1
  -DESP_VIDEO_VER_MINOR=0
  -DESP_VIDEO_VER_PATCH=0
  -DESP_IPA_VER_MAJOR=1
  -DESP_IPA_VER_MINOR=0
  -DESP_IPA_VER_PATCH=0
  -Wl,-u,sc202cs_detect
  -Wl,-u,__esp_ipa_detect_fn_awb_gray_world
  -Wl,-u,__esp_ipa_detect_fn_agc_threshold
  -Wl,-u,__esp_ipa_detect_fn_denoising_gain_feedback
  -Wl,-u,__esp_ipa_detect_fn_sharpen_freq_feedback
  -Wl,-u,__esp_ipa_detect_fn_gamma_lumma_feedback
  -Wl,-u,__esp_ipa_detect_fn_cc_linear
  -Wl,--wrap=esp_hosted_get_default_sdio_config
  -Wl,--wrap=hosted_mempool_alloc
  -Wl,--wrap=hosted_mempool_free
extra_scripts =
  pre:sanitize_build_paths.py
  pre:patch_i2c_slave.py
  add_riscv_path.py

lib_deps =
  https://github.com/M5Stack/M5Unified.git#b1ffcc677014ed8bd01e5a1f240736ae654bfe12
  https://github.com/M5Stack/M5GFX.git#ad9b814264d4e2000e9f30070002310bbccaffc9
  https://github.com/m5stack/TinyGPSPlus.git#254a10041ac38d17d98dab24c0ae4d2a8d19a677
  greiman/SdFat@^2.2.3
  rweather/Crypto@^0.4.0
  densaugeo/base64@^1.4.0

[env:esp32p4_pioarduino55]
extends = env:esp32p4_pioarduino
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.39
board = m5stack-tab5-p4
platform_packages =

[env:esp32p4_pioarduino55_jtag]
extends = env:esp32p4_pioarduino55
upload_protocol = esp-builtin
